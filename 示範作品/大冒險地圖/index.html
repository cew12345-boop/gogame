<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大冒險地圖</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #24180e;
      --paper: #fff8df;
      --line: rgba(69, 45, 22, 0.18);
      --green: #1f8a4c;
      --red: #c93f37;
      --blue: #326fb2;
      --shadow: rgba(20, 15, 10, 0.28);
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: #17291b;
      overflow: hidden;
    }

    button {
      color: inherit;
      font: inherit;
    }

    .cover-screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      background: #080d0a;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.75s ease, visibility 0.75s ease;
    }

    .cover-screen.hide {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .cover-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .story-screen {
      position: fixed;
      inset: 0;
      z-index: 28;
      display: none;
      place-items: center;
      background: #050706;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .story-screen.show {
      display: grid;
      opacity: 1;
    }

    .story-screen.fade {
      opacity: 0;
    }

    .story-screen img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .story-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.22) 48%, rgba(0, 0, 0, 0.5)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.18), transparent 34%, rgba(0, 0, 0, 0.7));
      pointer-events: none;
    }

    .story-copy {
      position: relative;
      z-index: 1;
      justify-self: start;
      align-self: end;
      width: min(720px, calc(100% - 32px));
      max-height: calc(100svh - 112px);
      margin: 0 0 clamp(70px, 10vh, 118px) clamp(16px, 6vw, 88px);
      overflow: auto;
      padding: clamp(18px, 3vw, 28px);
      border: 1px solid rgba(255, 236, 174, 0.32);
      border-radius: 8px;
      color: #fff8dc;
      background: rgba(8, 10, 13, 0.58);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(5px);
    }

    .story-title {
      margin: 0 0 8px;
      color: #ffeaa3;
      font-size: clamp(1.9rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .story-chapter {
      margin: 0 0 16px;
      color: rgba(255, 238, 174, 0.94);
      font-size: clamp(1.25rem, 3vw, 2rem);
      line-height: 1.15;
    }

    .story-label {
      display: inline-block;
      margin: 12px 0 5px;
      color: #ffeaa3;
      font-size: 0.95rem;
      font-weight: 900;
    }

    .story-scene,
    .story-narration,
    .story-line {
      margin: 0;
      white-space: pre-line;
      line-height: 1.7;
      font-weight: 800;
    }

    .story-scene {
      color: rgba(255, 248, 220, 0.82);
      font-size: clamp(0.92rem, 1.8vw, 1.06rem);
    }

    .story-narration {
      color: rgba(255, 248, 220, 0.94);
      font-size: clamp(1rem, 2.1vw, 1.2rem);
    }

    .story-line {
      color: #fff0a8;
      font-size: clamp(1.04rem, 2.4vw, 1.35rem);
    }

    .story-hint {
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: clamp(18px, 5vh, 54px);
      transform: translateX(-50%);
      min-width: 180px;
      padding: 10px 16px;
      border-radius: 999px;
      color: #fff8dc;
      background: rgba(0, 0, 0, 0.52);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      font-weight: 900;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding: 12px;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 228, 125, 0.2), transparent 22rem),
        radial-gradient(circle at 88% 8%, rgba(99, 183, 232, 0.18), transparent 20rem),
        linear-gradient(145deg, #264631 0%, #14251a 58%, #0d1711 100%);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(1672px, 100%);
      margin: 0 auto;
      color: #fff8dc;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3.8vw, 3.2rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(43, 31, 13, 0.65), 0 12px 24px var(--shadow);
    }

    .title p {
      margin: 5px 0 0;
      color: rgba(255, 248, 220, 0.86);
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      font-weight: 800;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .held-count {
      min-width: 118px;
      padding: 9px 12px;
      border-radius: 8px;
      color: #fff8dc;
      background: rgba(13, 19, 14, 0.66);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18), 0 10px 22px var(--shadow);
      font-weight: 900;
      text-align: center;
    }

    .clear-btn,
    .close-btn,
    .again-btn {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .clear-btn {
      min-height: 42px;
      padding: 9px 14px;
      color: #fff8dc;
      background: rgba(13, 19, 14, 0.72);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2), 0 10px 22px var(--shadow);
    }

    .clear-btn:hover,
    .close-btn:hover,
    .again-btn:hover {
      transform: translateY(-2px);
    }

    .map-stage {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .map-frame {
      position: relative;
      width: min(100%, calc((100vh - 104px) * 1672 / 941));
      max-width: 1672px;
      aspect-ratio: 1672 / 941;
      filter: drop-shadow(0 28px 52px rgba(0, 0, 0, 0.34));
    }

    .map-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      z-index: 2;
      padding: 0;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0);
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .hotspot:hover,
    .hotspot:focus-visible {
      outline: 0;
      background: rgba(255, 245, 176, 0.16);
      box-shadow: 0 0 34px 13px rgba(255, 235, 128, 0.42);
      transform: scale(1.02);
    }

    .hotspot-dynasty {
      left: 13.6%;
      top: 34.2%;
      width: 18.4%;
      height: 9.2%;
    }

    .hotspot-idiom {
      left: 68.5%;
      top: 34.1%;
      width: 18.6%;
      height: 9.3%;
    }

    .hotspot-warrior {
      left: 8.8%;
      top: 87%;
      width: 20.4%;
      height: 9%;
    }

    .hotspot-poetry {
      left: 68.6%;
      top: 87.1%;
      width: 19.4%;
      height: 8.8%;
    }

    .hotspot-door {
      left: 40.3%;
      top: 58.2%;
      width: 19.6%;
      height: 10.8%;
    }

    .stamp {
      position: absolute;
      z-index: 3;
      display: none;
      place-items: center;
      width: clamp(26px, 4.2vw, 58px);
      height: clamp(26px, 4.2vw, 58px);
      border: 3px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      color: #fff;
      background: rgba(31, 138, 76, 0.92);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22), 0 0 0 4px rgba(31, 138, 76, 0.24);
      font-size: clamp(1.15rem, 3vw, 2.3rem);
      font-weight: 1000;
      line-height: 1;
    }

    .stamp.show {
      display: grid;
    }

    .stamp-dynasty {
      left: 28.4%;
      top: 33.1%;
    }

    .stamp-idiom {
      left: 83.6%;
      top: 33%;
    }

    .stamp-warrior {
      left: 26.2%;
      top: 85.5%;
    }

    .stamp-poetry {
      left: 84%;
      top: 85.6%;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(5, 9, 8, 0.72);
    }

    .modal.show {
      display: grid;
    }

    .modal-panel {
      width: min(860px, 100%);
      max-height: min(820px, calc(100vh - 36px));
      overflow: auto;
      border: 2px solid rgba(255, 224, 138, 0.8);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.44);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h2 {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.2rem);
    }

    .close-btn {
      width: 42px;
      height: 42px;
      color: #fff8dc;
      background: #5b4630;
    }

    .door-game {
      padding: 22px;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .slot {
      min-height: 154px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      padding: 12px;
      border: 3px dashed rgba(65, 45, 25, 0.28);
      border-radius: 8px;
      background: #efe1b8;
      color: #71624b;
      font-weight: 900;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .slot.over {
      border-color: var(--blue);
      background: #e5f1ff;
    }

    .slot.filled {
      border-style: solid;
      border-color: var(--green);
      background: #dcffe4;
      color: var(--green);
    }

    .slot.wrong {
      animation: wrongFlash 0.34s ease;
    }

    .slot-label {
      font-size: 1.15rem;
    }

    .slot-hint {
      font-size: 0.95rem;
      opacity: 0.74;
    }

    .bag-title {
      margin: 0 0 12px;
      color: #5d431e;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .bag {
      min-height: 132px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 8px;
      background: #ead6a3;
      box-shadow: inset 0 0 0 1px rgba(69, 45, 22, 0.16);
    }

    .cert {
      min-width: 142px;
      min-height: 88px;
      display: grid;
      place-items: center;
      gap: 3px;
      padding: 10px 12px;
      border: 2px solid #b88628;
      border-radius: 8px;
      color: #3a2a13;
      background: linear-gradient(180deg, #fff3bf, #f1c85d);
      box-shadow: 0 10px 18px rgba(65, 45, 25, 0.18);
      cursor: grab;
      font-weight: 900;
      text-align: center;
      touch-action: none;
      user-select: none;
    }

    .cert:active {
      cursor: grabbing;
    }

    .cert .emoji {
      font-size: 2rem;
      line-height: 1;
    }

    .cert.placed {
      min-width: 118px;
      min-height: 76px;
      box-shadow: none;
      cursor: default;
    }

    .cert.dragging {
      opacity: 0.62;
    }

    .empty-bag {
      color: #6d5a3a;
      font-weight: 800;
    }

    .drag-ghost {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      opacity: 0.9;
      transform: translate(-50%, -50%);
    }

    .complete {
      display: none;
      place-items: center;
      gap: 16px;
      min-height: 410px;
      padding: 36px 22px;
      text-align: center;
    }

    .complete.show {
      display: grid;
    }

    .complete h2 {
      margin: 0;
      color: #6d3e08;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1;
    }

    .time {
      color: #3b2a16;
      font-size: 1.4rem;
      font-weight: 900;
    }

    .again-btn {
      padding: 13px 18px;
      color: #fff8dc;
      background: var(--green);
      box-shadow: 0 14px 24px rgba(31, 138, 76, 0.28);
    }

    @keyframes wrongFlash {
      0%,
      100% {
        border-color: rgba(65, 45, 25, 0.28);
        background: #efe1b8;
        transform: translateX(0);
      }
      25%,
      75% {
        border-color: var(--red);
        background: #ffd8d5;
        transform: translateX(-5px);
      }
      50% {
        transform: translateX(5px);
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: 100svh;
        padding: 10px;
      }

      .topbar {
        align-items: start;
      }

      .title p {
        max-width: 15rem;
      }

      .progress {
        max-width: 11rem;
      }

      .clear-btn,
      .held-count {
        width: 100%;
      }

      .map-frame {
        width: min(100%, calc((100svh - 128px) * 1672 / 941));
      }

      .slots {
        grid-template-columns: 1fr;
      }

      .story-copy {
        justify-self: center;
        width: calc(100% - 24px);
        max-height: calc(100svh - 92px);
        margin: 0 0 68px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="cover-screen" id="coverScreen" aria-label="遊戲開場封面">
    <img src="cover.png" alt="大冒險地圖開場封面">
  </div>

  <div class="story-screen" id="storyScreen" aria-live="polite">
    <img id="storyImage" src="page1.png" alt="">
    <article class="story-copy">
      <h2 class="story-title" id="storyTitle">群星歸途</h2>
      <h3 class="story-chapter" id="storyChapter">第一張｜風止之地</h3>
      <span class="story-label">場景</span>
      <p class="story-scene" id="storyScene"></p>
      <span class="story-label">旁白</span>
      <p class="story-narration" id="storyNarration"></p>
      <span class="story-label" id="storyLineLabel">角色台詞</span>
      <p class="story-line" id="storyLine"></p>
    </article>
    <div class="story-hint" id="storyHint">點擊進入關卡</div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="title">
        <h1>大冒險地圖</h1>
        <p>完成 4 個關卡，拿到 4 個憑證解開大門</p>
      </div>
      <div class="progress">
        <span class="held-count" id="heldCount">目前持有：0 / 4</span>
        <button class="clear-btn" id="clearProgress" type="button">🔄 清除進度</button>
      </div>
    </header>

    <main class="map-stage" aria-label="冒險地圖">
      <div class="map-frame">
        <img class="map-image" src="map-bg.png" alt="大冒險地圖">
        <button class="hotspot hotspot-dynasty" data-href="示範1_朝代配對/index.html" data-page="page1.png" type="button" aria-label="前往朝代配對"></button>
        <button class="hotspot hotspot-idiom" data-href="示範2_成語填字/index.html" data-page="page2.png" type="button" aria-label="前往成語填字"></button>
        <button class="hotspot hotspot-warrior" data-href="示範3_打怪RPG/index.html" data-page="page3.png" type="button" aria-label="前往打怪 RPG"></button>
        <button class="hotspot hotspot-poetry" data-href="示範4_詩詞對對樂/index.html" data-page="page4.png" type="button" aria-label="前往詩詞對對樂"></button>
        <button class="hotspot hotspot-door" id="openDoor" type="button" aria-label="開啟中央大門"></button>
        <span class="stamp stamp-dynasty" data-stamp="cert_dynasty" aria-hidden="true">✓</span>
        <span class="stamp stamp-idiom" data-stamp="cert_idiom" aria-hidden="true">✓</span>
        <span class="stamp stamp-warrior" data-stamp="cert_warrior" aria-hidden="true">✓</span>
        <span class="stamp stamp-poetry" data-stamp="cert_poetry" aria-hidden="true">✓</span>
      </div>
    </main>
  </div>

  <div class="modal" id="doorModal" role="dialog" aria-modal="true" aria-labelledby="doorTitle">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 id="doorTitle">通關大門</h2>
        <button class="close-btn" id="closeDoor" type="button" aria-label="關閉">×</button>
      </div>

      <div class="door-game" id="doorGame">
        <section class="slots" aria-label="憑證凹槽">
          <div class="slot" data-slot="dynasty">
            <span class="slot-label">朝代</span>
            <span class="slot-hint">放入朝代之印</span>
          </div>
          <div class="slot" data-slot="idiom">
            <span class="slot-label">成語</span>
            <span class="slot-hint">放入成語之印</span>
          </div>
          <div class="slot" data-slot="warrior">
            <span class="slot-label">勇者</span>
            <span class="slot-hint">放入勇者之印</span>
          </div>
        </section>

        <p class="bag-title">背包欄</p>
        <section class="bag" id="bag" aria-label="目前持有的憑證"></section>
      </div>

      <section class="complete" id="completeView" aria-live="polite">
        <h2>🏆 冒險完成！</h2>
        <p class="time">感謝你的旅程。</p>
        <div class="time" id="adventureTime">總冒險時長：00 分 00 秒</div>
        <button class="again-btn" id="again" type="button">再次冒險</button>
      </section>
    </div>
  </div>

  <script>
    const certs = [
      { key: "cert_dynasty", type: "dynasty", name: "朝代之印", emoji: "🎴" },
      { key: "cert_idiom", type: "idiom", name: "成語之印", emoji: "📝" },
      { key: "cert_warrior", type: "warrior", name: "勇者之印", emoji: "⚔️" },
      { key: "cert_poetry", type: "poetry", name: "詩詞之印", emoji: "📜" }
    ];

    const storyPages = {
      "page1.png": {
        chapter: "第一張｜風止之地",
        scene: "最終決戰結束後的古老遺跡。\n\n斷裂的石柱傾倒在焦黑的大地上，殘存的魔法光芒如星塵般緩緩消散。夕陽穿過厚重雲層，照亮滿目瘡痍的戰場。\n\n主角獨自站在高崖邊緣，俯瞰這片曾經改變世界命運的地方。",
        narration: "曾經震耳欲聾的戰吼，\n如今只剩風聲。\n\n世界終於記起了安靜的模樣。",
        line: "「原來終點，\n也會這麼平靜。」"
      },
      "page2.png": {
        chapter: "第二張｜燈火再明",
        scene: "經歷漫長黑暗後的村莊重現生機。\n\n街道兩旁掛起暖黃色燈火，花朵重新盛開。孩子們在石板路上追逐嬉戲，商人整理貨架，老人坐在門前閒談。\n\n主角披著斗篷從人群中緩緩走過，卻沒有人認出他。",
        narration: "有些故事被寫進史冊。\n\n有些故事，\n只留在人們安穩的日常裡。",
        line: ""
      },
      "page3.png": {
        chapter: "第三張｜群山回聲",
        scene: "鏡頭拉遠。\n\n廣闊的大陸展現在眼前。\n\n森林恢復翠綠，河流重新奔流，遠方高塔映照晨曦。白雲緩慢飄過山脈，萬物回到原本的節奏。",
        narration: "山依舊矗立。\n\n河依舊流淌。\n\n世界從未因誰而停止轉動。",
        line: "「真好啊……」"
      },
      "page4.png": {
        chapter: "第四張｜旅人未停",
        scene: "蜿蜒山路通往未知遠方。\n\n晨霧覆蓋群山，石板古道延伸至天際。主角背著行囊獨自行走，披風在山風中微微飄動。\n\n沒有城鎮，沒有夥伴。\n\n只有前方尚未命名的道路。",
        narration: "旅程從來不是為了抵達。\n\n而是在一次次離開之後，\n仍願意繼續前行。",
        line: "「下一個故事，\n會在哪裡等我呢？」"
      },
      "page5.png": {
        chapter: "第五張｜新的地平線",
        scene: "主角站在世界盡頭的高崖。\n\n遠方海面反射著初升朝陽。\n\n漂浮島嶼懸掛天空，未知大陸隱約浮現在雲海彼端。金色光芒穿透雲層，照亮未曾被探索的世界。\n\n主角靜靜凝望遠方。",
        narration: "每個傳說都會迎來結束。\n\n而每個結束，\n都只是另一段冒險的序章。",
        line: "「那麼，\n我們再出發吧。」"
      }
    };

    const coverScreen = document.querySelector("#coverScreen");
    const storyScreen = document.querySelector("#storyScreen");
    const storyImage = document.querySelector("#storyImage");
    const storyHint = document.querySelector("#storyHint");
    const storyChapter = document.querySelector("#storyChapter");
    const storyScene = document.querySelector("#storyScene");
    const storyNarration = document.querySelector("#storyNarration");
    const storyLine = document.querySelector("#storyLine");
    const storyLineLabel = document.querySelector("#storyLineLabel");
    const heldCount = document.querySelector("#heldCount");
    const modal = document.querySelector("#doorModal");
    const doorGame = document.querySelector("#doorGame");
    const completeView = document.querySelector("#completeView");
    const bag = document.querySelector("#bag");
    const slots = [...document.querySelectorAll(".slot")];
    const adventureTime = document.querySelector("#adventureTime");
    let touchDrag = null;
    let storyAction = null;

    function ensureStartTime() {
      if (!localStorage.getItem("adventure_start")) {
        localStorage.setItem("adventure_start", String(Date.now()));
      }
    }

    function hasCert(cert) {
      return localStorage.getItem(cert.key) === "true";
    }

    function refreshMap() {
      const count = certs.filter(hasCert).length;
      heldCount.textContent = `目前持有：${count} / 4`;

      document.querySelectorAll(".stamp").forEach((stamp) => {
        stamp.classList.toggle("show", localStorage.getItem(stamp.dataset.stamp) === "true");
      });
    }

    function allLevelsComplete() {
      return certs.every(hasCert);
    }

    function hideCover() {
      sessionStorage.setItem("adventure_cover_seen", "true");
      coverScreen.classList.add("hide");
    }

    if (sessionStorage.getItem("adventure_cover_seen") === "true") {
      coverScreen.classList.add("hide");
    }

    coverScreen.addEventListener("click", hideCover);
    coverScreen.addEventListener("keydown", hideCover);

    document.querySelectorAll(".hotspot[data-href]").forEach((hotspot) => {
      hotspot.addEventListener("click", () => {
        sessionStorage.setItem("adventure_cover_seen", "true");
        const targetUrl = new URL(hotspot.dataset.href, window.location.href);
        showStoryPage(hotspot.dataset.page, "點擊進入關卡", () => {
          window.location.assign(targetUrl.href);
        });
      });
    });

    function showStoryPage(imageSrc, hint, onComplete) {
      const story = storyPages[imageSrc];
      storyAction = onComplete;
      storyImage.src = imageSrc;
      storyChapter.textContent = story.chapter;
      storyScene.textContent = story.scene;
      storyNarration.textContent = story.narration;
      storyLine.textContent = story.line;
      storyLine.hidden = !story.line;
      storyLineLabel.hidden = !story.line;
      storyHint.textContent = hint;
      storyScreen.classList.remove("fade");
      storyScreen.classList.add("show");
    }

    function closeStoryPage() {
      if (!storyScreen.classList.contains("show")) return;
      const action = storyAction;
      storyAction = null;
      storyScreen.classList.add("fade");

      window.setTimeout(() => {
        storyScreen.classList.remove("show", "fade");
        if (action) action();
      }, 460);
    }

    function makeCertBadge(cert) {
      const badge = document.createElement("div");
      badge.className = "cert";
      badge.draggable = true;
      badge.dataset.type = cert.type;
      badge.innerHTML = `<span class="emoji">${cert.emoji}</span><span>${cert.name}</span>`;

      badge.addEventListener("dragstart", (event) => {
        event.dataTransfer.setData("text/plain", cert.type);
        event.dataTransfer.effectAllowed = "move";
        badge.classList.add("dragging");
      });

      badge.addEventListener("dragend", () => {
        badge.classList.remove("dragging");
      });

      badge.addEventListener("touchstart", beginTouchDrag, { passive: false });
      return badge;
    }

    function renderBag() {
      bag.innerHTML = "";
      slots.forEach((slot) => {
        slot.classList.remove("filled", "over", "wrong");
        const label = slot.querySelector(".slot-label").textContent;
        const hint = slot.querySelector(".slot-hint").textContent;
        slot.innerHTML = `<span class="slot-label">${label}</span><span class="slot-hint">${hint}</span>`;
      });

      const owned = certs.filter(hasCert);
      if (owned.length === 0) {
        bag.innerHTML = `<span class="empty-bag">目前還沒有憑證，先去完成關卡吧。</span>`;
        return;
      }

      owned.forEach((cert) => bag.appendChild(makeCertBadge(cert)));
    }

    function flashWrong(slot) {
      slot.classList.remove("wrong");
      window.setTimeout(() => slot.classList.add("wrong"), 0);
      window.setTimeout(() => slot.classList.remove("wrong"), 360);
    }

    function placeCert(type, slot, badge) {
      if (slot.classList.contains("filled") || slot.dataset.slot !== type) {
        flashWrong(slot);
        return false;
      }

      slot.classList.add("filled");
      slot.innerHTML = "";
      badge.classList.remove("dragging");
      badge.classList.add("placed");
      badge.draggable = false;
      slot.appendChild(badge);
      checkDoorComplete();
      return true;
    }

    function checkDoorComplete() {
      const allFilled = slots.every((slot) => slot.classList.contains("filled"));
      if (!allFilled) return;

      showAdventureComplete();
    }

    function showAdventureComplete() {
      const elapsed = Math.max(0, Date.now() - Number(localStorage.getItem("adventure_start") || Date.now()));
      const totalSeconds = Math.floor(elapsed / 1000);
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      adventureTime.textContent = `總冒險時長：${minutes} 分 ${seconds} 秒`;
      doorGame.style.display = "none";
      completeView.classList.add("show");
    }

    function openDoorModal() {
      if (allLevelsComplete()) {
        showStoryPage("page5.png", "點擊完成冒險", () => {
          modal.classList.add("show");
          showAdventureComplete();
        });
        return;
      }

      renderBag();
      doorGame.style.display = "block";
      completeView.classList.remove("show");
      modal.classList.add("show");
    }

    function clearAdventure(clearEverything = false) {
      if (clearEverything) {
        localStorage.clear();
        sessionStorage.clear();
        window.location.reload();
        return;
      }

      ["cert_dynasty", "cert_idiom", "cert_warrior", "cert_poetry", "adventure_start"].forEach((key) => localStorage.removeItem(key));
      ensureStartTime();
      refreshMap();
      renderBag();
      doorGame.style.display = "block";
      completeView.classList.remove("show");
    }

    slots.forEach((slot) => {
      slot.addEventListener("dragover", (event) => {
        event.preventDefault();
        slot.classList.add("over");
      });

      slot.addEventListener("dragleave", () => slot.classList.remove("over"));

      slot.addEventListener("drop", (event) => {
        event.preventDefault();
        slot.classList.remove("over");
        const type = event.dataTransfer.getData("text/plain");
        const badge = document.querySelector(`.cert.dragging[data-type="${type}"]`);
        if (badge) placeCert(type, slot, badge);
      });
    });

    function getTouchPoint(event) {
      return event.touches[0] || event.changedTouches[0];
    }

    function beginTouchDrag(event) {
      if (event.currentTarget.classList.contains("placed")) return;
      event.preventDefault();
      const point = getTouchPoint(event);
      const ghost = event.currentTarget.cloneNode(true);
      ghost.classList.add("drag-ghost");
      document.body.appendChild(ghost);
      touchDrag = {
        type: event.currentTarget.dataset.type,
        source: event.currentTarget,
        ghost
      };
      moveGhost(point);
    }

    function moveGhost(point) {
      if (!touchDrag || !point) return;
      touchDrag.ghost.style.left = `${point.clientX}px`;
      touchDrag.ghost.style.top = `${point.clientY}px`;
    }

    window.addEventListener("touchmove", (event) => {
      if (!touchDrag) return;
      event.preventDefault();
      const point = getTouchPoint(event);
      moveGhost(point);
      slots.forEach((slot) => slot.classList.remove("over"));
      const under = document.elementFromPoint(point.clientX, point.clientY);
      const slot = under && under.closest(".slot");
      if (slot) slot.classList.add("over");
    }, { passive: false });

    window.addEventListener("touchend", (event) => {
      if (!touchDrag) return;
      const point = getTouchPoint(event);
      const under = point && document.elementFromPoint(point.clientX, point.clientY);
      const slot = under && under.closest(".slot");
      slots.forEach((item) => item.classList.remove("over"));
      touchDrag.ghost.remove();
      if (slot) placeCert(touchDrag.type, slot, touchDrag.source);
      touchDrag = null;
    });

    window.addEventListener("touchcancel", () => {
      if (!touchDrag) return;
      touchDrag.ghost.remove();
      touchDrag = null;
      slots.forEach((slot) => slot.classList.remove("over"));
    });

    document.querySelector("#openDoor").addEventListener("click", openDoorModal);
    storyScreen.addEventListener("click", closeStoryPage);
    window.addEventListener("keydown", (event) => {
      if ((event.key === "Enter" || event.key === " ") && storyScreen.classList.contains("show")) {
        event.preventDefault();
        closeStoryPage();
      }
    });
    document.querySelector("#closeDoor").addEventListener("click", () => modal.classList.remove("show"));
    document.querySelector("#clearProgress").addEventListener("click", () => clearAdventure());
    document.querySelector("#again").addEventListener("click", () => clearAdventure(true));
    modal.addEventListener("click", (event) => {
      if (event.target === modal) modal.classList.remove("show");
    });

    ensureStartTime();
    refreshMap();
  </script>
</body>
</html>
