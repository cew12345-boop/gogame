<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打怪 RPG 進階版</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #10131f;
      --panel: #1b2134;
      --panel-2: #252d43;
      --line: rgba(255, 255, 255, 0.14);
      --text: #fff7d8;
      --muted: #b9c1d8;
      --gold: #ffd45f;
      --gold-deep: #b97820;
      --green: #47d16d;
      --yellow: #f8d84d;
      --red: #ff4b5c;
      --blue: #57c7ff;
      --purple: #bf8cff;
      --wood: #845226;
      --wood-light: #c58942;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Trebuchet MS", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(87, 199, 255, 0.22), transparent 22rem),
        radial-gradient(circle at 85% 18%, rgba(255, 212, 95, 0.18), transparent 20rem),
        linear-gradient(180deg, #171a2a 0%, #0d1020 58%, #070914 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 2px, transparent 2px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
    }

    .app {
      position: relative;
      width: min(1120px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0 30px;
    }

    .map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 9px 14px;
      border: 2px solid rgba(255, 212, 95, 0.7);
      border-radius: 8px;
      color: var(--gold);
      background: rgba(32, 25, 21, 0.82);
      box-shadow: 0 12px 24px var(--shadow), inset 0 0 0 2px rgba(255, 255, 255, 0.08);
      font-weight: 900;
      text-decoration: none;
    }

    .map-link:hover {
      background: rgba(51, 38, 28, 0.96);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 64px;
    }

    h1 {
      margin: 0;
      color: #fff0a8;
      font-size: clamp(2rem, 5vw, 4.25rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 4px 0 #713e1b, 0 12px 28px rgba(0, 0, 0, 0.45);
    }

    .coin-counter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 130px;
      padding: 10px 14px;
      border: 2px solid rgba(255, 212, 95, 0.7);
      border-radius: 8px;
      color: var(--gold);
      background: rgba(32, 25, 21, 0.82);
      box-shadow: 0 12px 24px var(--shadow), inset 0 0 0 2px rgba(255, 255, 255, 0.08);
      font-size: 1.45rem;
      font-weight: 900;
      transform-origin: center;
    }

    .coin-counter.pop {
      animation: coinPop 0.34s ease;
    }

    .ending-cutscene {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      overflow: hidden;
      color: #fff8df;
      background: #040507;
      cursor: pointer;
    }

    .ending-cutscene.show {
      display: block;
    }

    .ending-cutscene.fade-out {
      animation: cutsceneFadeOut 0.7s ease forwards;
    }

    .ending-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.035);
      transition: opacity 0.75s ease, transform 5.6s ease;
    }

    .ending-cutscene.show .ending-image {
      opacity: 1;
      transform: scale(1);
    }

    .ending-vignette {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.66), rgba(0, 0, 0, 0.18) 45%, rgba(0, 0, 0, 0.58)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.22), transparent 38%, rgba(0, 0, 0, 0.74));
    }

    .ending-content {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: grid;
      align-content: end;
      gap: 16px;
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.72);
    }

    .ending-kicker {
      color: rgba(255, 232, 155, 0.92);
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .ending-title {
      margin: 0;
      color: #ffeaa3;
      font-size: clamp(2.3rem, 7vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .ending-scene {
      display: grid;
      gap: 14px;
      max-width: 660px;
      padding: 22px 24px;
      border: 1px solid rgba(255, 234, 163, 0.28);
      border-radius: 8px;
      background: rgba(7, 9, 13, 0.58);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(5px);
    }

    .ending-scene h3 {
      margin: 0;
      color: #ffeaa3;
      font-size: clamp(1.45rem, 4vw, 2.4rem);
      line-height: 1.1;
    }

    .ending-narration,
    .ending-line {
      margin: 0;
      white-space: pre-line;
      line-height: 1.75;
    }

    .ending-narration {
      color: rgba(255, 248, 223, 0.9);
      font-size: clamp(1rem, 2vw, 1.18rem);
      font-weight: 700;
    }

    .ending-line {
      color: #fff0a8;
      font-size: clamp(1.08rem, 2.4vw, 1.38rem);
      font-weight: 900;
    }

    .ending-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      max-width: 660px;
      color: rgba(255, 248, 223, 0.72);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .ending-dots {
      display: flex;
      gap: 7px;
    }

    .ending-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 248, 223, 0.36);
    }

    .ending-dot.active {
      background: #ffeaa3;
    }

    .ending-complete {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      place-items: center;
      padding: 28px;
      text-align: center;
      background: rgba(3, 5, 7, 0.82);
    }

    .ending-complete.show {
      display: grid;
      animation: completeFadeIn 1.1s ease forwards;
    }

    .ending-complete h2 {
      margin: 0;
      color: #ffeaa3;
      font-size: clamp(2.6rem, 9vw, 6.4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .ending-complete p {
      margin: 18px 0 0;
      color: rgba(255, 248, 223, 0.78);
      font-size: clamp(1.1rem, 3vw, 1.65rem);
      font-weight: 800;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .loading {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 120px);
      text-align: center;
    }

    .loading-box {
      display: grid;
      gap: 18px;
      justify-items: center;
      max-width: 520px;
      padding: 30px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 33, 52, 0.78);
      box-shadow: 0 18px 36px var(--shadow);
    }

    .spinner {
      width: 76px;
      height: 76px;
      border: 8px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .battle {
      display: grid;
      gap: 18px;
    }

    .stage-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 800;
    }

    .arena {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
      min-height: 330px;
      padding: clamp(14px, 3vw, 24px);
      border: 2px solid rgba(87, 199, 255, 0.32);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 34%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 3px, transparent 3px 16px),
        linear-gradient(135deg, rgba(37, 45, 67, 0.94), rgba(16, 19, 31, 0.96));
      box-shadow: 0 20px 42px var(--shadow), inset 0 0 0 3px rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .arena.flash-good {
      animation: goodFlash 0.2s ease;
    }

    .arena.flash-bad {
      animation: badShake 0.3s ease;
    }

    .arena.critical {
      animation: criticalGlow 0.55s ease;
    }

    .fighter {
      position: relative;
      display: grid;
      align-content: end;
      gap: 12px;
      min-height: 260px;
      padding: 16px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(13, 16, 32, 0.62);
    }

    .fighter.monster {
      text-align: right;
    }

    .sprite {
      display: grid;
      place-items: center;
      min-height: 128px;
      font-size: clamp(5.2rem, 12vw, 8.5rem);
      filter: drop-shadow(0 14px 14px rgba(0, 0, 0, 0.32));
      user-select: none;
    }

    .sprite.hit {
      animation: hitBump 0.28s ease;
    }

    .fighter-name {
      color: #ffffff;
      font-size: clamp(1.15rem, 3vw, 1.55rem);
      font-weight: 900;
    }

    .hp-row {
      display: grid;
      gap: 7px;
    }

    .hp-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .hpbar {
      height: 22px;
      padding: 3px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .hpfill {
      width: 100%;
      height: 100%;
      border-radius: 3px;
      background: var(--green);
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.16);
      transition: width 0.25s ease, background 0.2s ease;
    }

    .hpfill.low {
      background: var(--yellow);
    }

    .hpfill.danger {
      background: var(--red);
      animation: blink 0.55s steps(2) infinite;
    }

    .versus {
      display: grid;
      place-items: center;
      width: clamp(64px, 9vw, 98px);
      color: var(--gold);
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      text-shadow: 0 3px 0 #593016;
    }

    .question-bubble {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 3px solid rgba(255, 212, 95, 0.78);
      border-radius: 8px;
      background: #fff5c4;
      color: #241a18;
      box-shadow: 0 12px 24px var(--shadow);
    }

    .question-bubble::after {
      content: "";
      position: absolute;
      right: 32px;
      bottom: -14px;
      width: 24px;
      height: 24px;
      border-right: 3px solid rgba(255, 212, 95, 0.78);
      border-bottom: 3px solid rgba(255, 212, 95, 0.78);
      background: #fff5c4;
      transform: rotate(45deg);
    }

    .question-text {
      min-height: 56px;
      font-size: clamp(1.16rem, 3vw, 1.55rem);
      font-weight: 900;
      line-height: 1.45;
    }

    .feedback {
      min-height: 30px;
      color: #fff0a8;
      font-size: 1.1rem;
      font-weight: 900;
      text-align: center;
    }

    .feedback.bad {
      color: #ffc6c6;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .answer-btn,
    .action-btn,
    .shop-btn {
      min-height: 52px;
      padding: 10px 12px;
      border: 2px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: linear-gradient(180deg, #384563, #222a40);
      box-shadow: 0 8px 0 #11182a, 0 14px 24px rgba(0, 0, 0, 0.24);
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.12s ease, filter 0.12s ease, border-color 0.12s ease;
    }

    .answer-btn:hover,
    .action-btn:hover,
    .shop-btn:hover {
      border-color: rgba(255, 212, 95, 0.72);
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .answer-btn:active,
    .action-btn:active,
    .shop-btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #11182a, 0 8px 16px rgba(0, 0, 0, 0.22);
    }

    .answer-btn[disabled],
    .action-btn[disabled],
    .shop-btn[disabled] {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
      filter: grayscale(0.55);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 33, 52, 0.78);
    }

    .inventory-summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 800;
    }

    .action-btn.primary {
      background: linear-gradient(180deg, #3fb86a, #237946);
      box-shadow: 0 8px 0 #134b2e, 0 14px 24px rgba(0, 0, 0, 0.24);
    }

    .action-btn.warning {
      background: linear-gradient(180deg, #ffcf5b, #bd7e22);
      color: #201610;
      box-shadow: 0 8px 0 #6e4515, 0 14px 24px rgba(0, 0, 0, 0.24);
    }

    .critical-text {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      color: #ffe9a8;
      font-size: clamp(2.4rem, 10vw, 6.5rem);
      font-weight: 900;
      text-shadow: 0 4px 0 #ad1b2a, 0 0 28px rgba(255, 75, 92, 0.9);
      pointer-events: none;
      z-index: 5;
    }

    .critical-text.show {
      display: grid;
      animation: criticalText 0.72s ease forwards;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(3, 5, 12, 0.72);
      z-index: 20;
    }

    .modal-backdrop.active {
      display: grid;
    }

    .modal {
      width: min(520px, 100%);
      padding: 20px;
      border: 2px solid rgba(255, 212, 95, 0.62);
      border-radius: 8px;
      background: #1b2134;
      box-shadow: 0 24px 52px rgba(0, 0, 0, 0.45);
    }

    .modal h2,
    .shop h2,
    .end-panel h2 {
      margin: 0 0 14px;
      color: #fff0a8;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
      text-shadow: 0 3px 0 #713e1b;
    }

    .bag-items {
      display: grid;
      gap: 12px;
      margin: 14px 0 18px;
    }

    .bag-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    .bag-item strong {
      display: block;
      font-size: 1.1rem;
    }

    .bag-item span {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .shop {
      display: grid;
      gap: 16px;
      padding: clamp(16px, 3vw, 28px);
      border: 3px solid #5b3418;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(54, 29, 11, 0.18) 1px, transparent 1px),
        repeating-linear-gradient(90deg, rgba(255, 245, 191, 0.07) 0 8px, transparent 8px 34px),
        linear-gradient(135deg, var(--wood-light), var(--wood) 48%, #5c3418);
      box-shadow: 0 22px 48px var(--shadow), inset 0 0 0 4px rgba(255, 241, 181, 0.12);
    }

    .shop-top {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .shop-note {
      color: #2a160b;
      font-size: 1.05rem;
      font-weight: 900;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .shop-card {
      display: grid;
      gap: 10px;
      min-height: 238px;
      padding: 16px;
      border: 3px solid rgba(70, 36, 14, 0.75);
      border-radius: 8px;
      color: #24150d;
      background: rgba(255, 238, 178, 0.9);
      box-shadow: 0 12px 0 rgba(82, 42, 16, 0.48), inset 0 0 0 3px rgba(255, 255, 255, 0.22);
    }

    .shop-icon {
      font-size: 3.2rem;
      line-height: 1;
    }

    .shop-card h3 {
      margin: 0;
      font-size: 1.35rem;
    }

    .shop-card p {
      margin: 0;
      min-height: 46px;
      color: #6a3c1b;
      font-weight: 800;
      line-height: 1.35;
    }

    .shop-card .price {
      color: #8a4f13;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .shop-btn {
      color: white;
      background: linear-gradient(180deg, #2c9ce2, #176ca0);
      box-shadow: 0 7px 0 #0e3d5c, 0 13px 22px rgba(0, 0, 0, 0.22);
    }

    .end-screen {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 120px);
    }

    .end-panel {
      width: min(680px, 100%);
      padding: clamp(20px, 4vw, 34px);
      border: 2px solid rgba(255, 212, 95, 0.7);
      border-radius: 8px;
      text-align: center;
      background: rgba(27, 33, 52, 0.88);
      box-shadow: 0 24px 52px var(--shadow);
    }

    .end-panel.game-over {
      border-color: rgba(255, 75, 92, 0.86);
      background:
        radial-gradient(circle at center, rgba(255, 75, 92, 0.38), transparent 26rem),
        linear-gradient(135deg, #731827, #2b0e18 70%);
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .result-stat {
      padding: 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .result-stat span {
      display: block;
      color: var(--muted);
      font-weight: 800;
    }

    .result-stat strong {
      display: block;
      margin-top: 4px;
      color: var(--gold);
      font-size: 2rem;
      line-height: 1;
    }

    .hide {
      display: none !important;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes coinPop {
      40% {
        transform: scale(1.18) rotate(-2deg);
      }
    }

    @keyframes goodFlash {
      50% {
        box-shadow: 0 20px 42px var(--shadow), inset 0 0 0 999px rgba(71, 209, 109, 0.18);
      }
    }

    @keyframes badShake {
      15%, 85% {
        transform: translateX(-8px);
      }
      35%, 65% {
        transform: translateX(8px);
      }
    }

    @keyframes criticalGlow {
      50% {
        box-shadow: 0 20px 42px var(--shadow), inset 0 0 0 999px rgba(255, 75, 92, 0.25);
      }
    }

    @keyframes criticalText {
      0% {
        opacity: 0;
        transform: scale(0.7) rotate(-5deg);
      }
      26% {
        opacity: 1;
        transform: scale(1.08) rotate(2deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.18);
      }
    }

    @keyframes hitBump {
      50% {
        transform: translateY(-10px) scale(1.08);
      }
    }

    @keyframes blink {
      50% {
        filter: brightness(1.65);
      }
    }

    @keyframes completeFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes cutsceneFadeOut {
      to {
        opacity: 0;
      }
    }

    @media (max-width: 780px) {
      header,
      .stage-label,
      .shop-top {
        align-items: stretch;
        flex-direction: column;
      }

      header {
        display: grid;
      }

      .coin-counter {
        justify-self: start;
      }

      .arena {
        grid-template-columns: 1fr;
      }

      .fighter {
        min-height: 210px;
      }

      .fighter.monster {
        text-align: left;
      }

      .versus {
        width: 100%;
        min-height: 48px;
      }

      .answers,
      .shop-grid,
      .result-stats {
        grid-template-columns: 1fr;
      }

      .ending-content {
        padding: 22px 0;
      }

      .ending-scene {
        padding: 18px;
      }

      .ending-footer {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>打怪 RPG</h1>
      <a class="map-link" href="../index.html">← 回到大地圖</a>

    const endingSlides = [

        line: ""

      {
        image: "../page3.png",

        narration: "山依舊矗立。\n河依舊流淌。\n世界從未因誰而停止轉動。",
        line: "「真好啊……」"
      },
      {

        narration: "旅程從來不是為了抵達。\n而是在一次次離開之後，\n仍願意繼續前行。",

        narration: "每個傳說都會迎來結束。\n而每個結束，\n都只是另一段冒險的序章。",
        line: "「那麼，\n我們再出發吧。」"

    const state = {
      questions: [],

      level: 0,
      playerHp: 100,

      potionsUsed: 0,

    let endingIndex = 0;

    const els = {

      endScreen: document.getElementById("endScreen"),

      coinCounter: document.getElementById("coinCounter"),
      coinText: document.getElementById("coinText"),

      playerSprite: document.getElementById("playerSprite"),
      monsterSprite: document.getElementById("monsterSprite"),
      monsterName: document.getElementById("monsterName"),

      monsterHpText: document.getElementById("monsterHpText"),
      playerHpFill: document.getElementById("playerHpFill"),
      monsterHpFill: document.getElementById("monsterHpFill"),
      questionText: document.getElementById("questionText"),
      answers: document.getElementById("answers"),
      feedback: document.getElementById("feedback"),
      inventorySummary: document.getElementById("inventorySummary"),
      bagBtn: document.getElementById("bagBtn"),
      bagModal: document.getElementById("bagModal"),
      bagItems: document.getElementById("bagItems"),
      closeBagBtn: document.getElementById("closeBagBtn"),
      shopGrid: document.getElementById("shopGrid"),
      shopNote: document.getElementById("shopNote"),
      nextLevelBtn: document.getElementById("nextLevelBtn"),
      criticalText: document.getElementById("criticalText"),
      endPanel: document.getElementById("endPanel"),
      endTitle: document.getElementById("endTitle"),
      endMessage: document.getElementById("endMessage"),
      resultCorrect: document.getElementById("resultCorrect"),
      resultCoins: document.getElementById("resultCoins"),
      resultPotions: document.getElementById("resultPotions"),
      restartBtn: document.getElementById("restartBtn"),
      endingCutscene: document.getElementById("endingCutscene"),
      endingImage: document.getElementById("endingImage"),
      endingTitle: document.getElementById("endingTitle"),
      endingChapter: document.getElementById("endingChapter"),
      endingNarration: document.getElementById("endingNarration"),
      endingLine: document.getElementById("endingLine"),
      endingDots: document.getElementById("endingDots"),
      endingPrompt: document.getElementById("endingPrompt"),
      endingContent: document.getElementById("endingContent"),
      endingComplete: document.getElementById("endingComplete")
    };

    function showScreen(name) {
      [els.loadingScreen, els.battleScreen, els.shopScreen, els.endScreen].forEach(screen => {
        screen.classList.remove("active");
      });
      els[name].classList.add("active");
    }

    function renderEndingSlide() {
      const slide = endingSlides[endingIndex];
      els.endingImage.style.opacity = "0";

      window.setTimeout(() => {
        els.endingImage.src = slide.image;
        els.endingChapter.textContent = slide.chapter;
        els.endingNarration.textContent = slide.narration;
        els.endingLine.textContent = slide.line;
        els.endingLine.hidden = !slide.line;
        els.endingDots.innerHTML = endingSlides.map((_, index) => (
          `<span class="ending-dot${index === endingIndex ? " active" : ""}"></span>`
        )).join("");
        els.endingPrompt.textContent = endingIsFinal ? "點擊完成旅程" : "點擊繼續冒險";
        els.endingImage.style.opacity = "1";
      }, 180);
    }

    function startEndingCutscene(slideIndex, options = {}) {
      endingIndex = slideIndex;
      endingLocked = false;
      endingIsFinal = Boolean(options.final);
      endingNextAction = options.onComplete || null;
      els.endingCutscene.classList.remove("fade-out");
      els.endingComplete.classList.remove("show");
      els.endingContent.hidden = false;
      els.endingCutscene.classList.add("show");
      renderEndingSlide();
    }

    function closeEndingCutscene() {
      endingLocked = true;
      els.endingCutscene.classList.add("fade-out");

      window.setTimeout(() => {
        const nextAction = endingNextAction;
        els.endingCutscene.classList.remove("show", "fade-out");
        els.endingComplete.classList.remove("show");
        els.endingContent.hidden = false;
        endingLocked = false;
        endingNextAction = null;
        endingIsFinal = false;
        if (nextAction) nextAction();
      }, 720);
    }

    function finishEndingCutscene() {
      endingLocked = true;
      els.endingContent.hidden = true;
      els.endingComplete.classList.add("show");

      window.setTimeout(() => {
        els.endingCutscene.classList.add("fade-out");
      }, 2300);

      window.setTimeout(() => {
        els.endingCutscene.classList.remove("show", "fade-out");
        els.endingComplete.classList.remove("show");
        els.endingContent.hidden = false;
        els.endPanel.classList.remove("game-over");
        els.endTitle.textContent = "冒險完成";
        els.endMessage.textContent = "感謝你的旅程。";
        renderResults();
        showScreen("endScreen");
        endingLocked = false;
      }, 3100);
    }

    function advanceEndingCutscene() {
      if (!els.endingCutscene.classList.contains("show") || endingLocked) return;

      if (endingIsFinal) {
        finishEndingCutscene();
        return;
      }

      closeEndingCutscene();
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell.trim());
          if (row.some(value => value !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell.trim());
      if (row.some(value => value !== "")) rows.push(row);
      return rows;
    }

    function normalizeQuestions(rows) {
      return rows.slice(1).map(row => {
        const [question, correct, ...wrong] = row;
        return {
          question: cleanQuestion(question),
          correct,
          wrong: wrong.filter(option => option && option !== "空")
        };
      }).filter(item => item.question && item.correct && item.wrong.length > 0);
    }

    function cleanQuestion(question) {
      return question.replace(/\s*\d+\s*$/, "").trim();
    }

    async function loadQuestions() {
      try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("題庫連線失敗");
        const text = await response.text();
        const questions = normalizeQuestions(parseCsv(text));
        if (!questions.length) throw new Error("題庫沒有可用題目");
        state.questions = questions;
        els.loadingText.textContent = `題庫載入完成，共 ${questions.length} 題`;
      } catch (error) {
        state.questions = fallbackQuestions;
        els.loadingText.textContent = "線上題庫暫時無法載入，已使用內建範例題庫";
      }

      setTimeout(startGame, 500);
    }

    function startGame() {
      state.level = 0;
      state.playerHp = 100;
      state.monsterHp = 100;
      state.coins = 0;
      state.correctCount = 0;
      state.potionsUsed = 0;
      state.inventory = { potions: 0, crystals: 0, charms: 0 };
      state.canAct = true;
      state.restartedAtOneHp = false;
      els.endPanel.classList.remove("game-over");
      updateCoin(0, false);
      startLevel(0, 100);
    }

    function startLevel(levelIndex, hp = state.playerHp) {
      state.level = levelIndex;
      state.playerHp = Math.max(1, Math.min(100, hp));
      state.monsterHp = 100;
      state.canAct = true;
      const monster = monsters[levelIndex];
      els.levelText.textContent = `第 ${levelIndex + 1} 關 / 5`;
      els.battleStatus.textContent = `${monster.name} 出現了！`;
      els.monsterSprite.textContent = monster.emoji;
      els.monsterName.textContent = monster.name;
      els.feedback.textContent = "";
      els.feedback.classList.remove("bad");
      showScreen("battleScreen");
      updateAllUi();
      drawQuestion();
    }

    function drawQuestion() {
      const question = randomItem(state.questions);
      const options = shuffle([
        { text: question.correct, correct: true },
        ...shuffle(question.wrong).slice(0, 3).map(text => ({ text, correct: false }))
      ]);

      while (options.length < 4) {
        options.push({ text: "空", correct: false, disabled: true });
      }

      state.currentQuestion = { ...question, options };
      els.questionText.textContent = question.question;
      els.answers.innerHTML = "";
      options.forEach((option, index) => {
        const button = document.createElement("button");
        button.className = "answer-btn";
        button.type = "button";
        button.disabled = option.disabled;
        button.textContent = `${String.fromCharCode(65 + index)}. ${option.text}`;
        button.addEventListener("click", () => chooseAnswer(option));
        els.answers.appendChild(button);
      });
    }

    function chooseAnswer(option) {
      if (!state.canAct) return;
      state.canAct = false;
      setAnswerButtons(true);

      if (option.correct) {
        const isCritical = state.inventory.crystals > 0;
        const damage = isCritical ? 50 : 25;
        if (isCritical) {
          state.inventory.crystals -= 1;
          showCritical();
        }
        state.correctCount += 1;
        state.monsterHp = Math.max(0, state.monsterHp - damage);
        updateCoin(state.coins + 5);
        flashArena("flash-good");
        bump(els.monsterSprite);
        els.feedback.classList.remove("bad");
        els.feedback.textContent = `答對！造成 ${damage} 傷害，獲得 5 金幣。`;
        updateAllUi();

        setTimeout(() => {
          if (state.monsterHp <= 0) {
            defeatMonster();
          } else {
            state.canAct = true;
            setAnswerButtons(false);
            drawQuestion();
          }
        }, isCritical ? 900 : 520);
      } else {
        state.playerHp = Math.max(0, state.playerHp - 25);
        flashArena("flash-bad");
        bump(els.playerSprite);
        els.feedback.classList.add("bad");
        els.feedback.textContent = `答錯了，正確答案是：${state.currentQuestion.correct}`;
        updateAllUi();
        setTimeout(resolvePlayerDamage, 2000);
      }
    }

    function resolvePlayerDamage() {
      if (state.playerHp <= 0) {
        handleDeath();
        return;
      }
      state.canAct = true;
      setAnswerButtons(false);
      els.feedback.textContent = "";
      els.feedback.classList.remove("bad");
      drawQuestion();
    }

    function handleDeath() {
      if (state.inventory.charms > 0) {
        state.inventory.charms -= 1;
        state.playerHp = 1;
        els.feedback.classList.add("bad");
        els.feedback.textContent = "救命符發動！HP 回到 1。";
        updateAllUi();
        setTimeout(() => {
          state.canAct = true;
          setAnswerButtons(false);
          drawQuestion();
        }, 900);
        return;
      }

      if (!state.restartedAtOneHp) {
        state.restartedAtOneHp = true;
        els.feedback.classList.add("bad");
        els.feedback.textContent = "你倒下了，重來本關！HP 只剩 1。";
        setTimeout(() => startLevel(state.level, 1), 1100);
        return;
      }

      showGameOver();
    }

    function defeatMonster() {
      const reward = randomInt(20, 50);
      updateCoin(state.coins + reward);
      els.feedback.classList.remove("bad");
      els.feedback.textContent = `${monsters[state.level].name} 被打倒！額外獲得 ${reward} 金幣。`;
      updateAllUi();
      setTimeout(() => {
        if (state.level >= monsters.length - 1) {
          showVictory();
        } else {
          openShop(reward);
        }
      }, 1000);
    }

    function openShop(reward) {
      els.shopNote.textContent = `剛剛掉落 ${reward} 金幣。準備好就前往第 ${state.level + 2} 關。`;
      renderShop();
      showScreen("shopScreen");
    }

    function renderShop() {
      els.shopGrid.innerHTML = "";
      shopItems.forEach(item => {
        const card = document.createElement("article");
        card.className = "shop-card";
        card.innerHTML = `
          <div class="shop-icon">${item.icon}</div>
          <h3>${item.name}</h3>
          <p>${item.effect}</p>
          <div class="price">💰 ${item.price}</div>
        `;
        const button = document.createElement("button");
        button.className = "shop-btn";
        button.type = "button";
        button.disabled = state.coins < item.price;
        button.textContent = `購買（持有 ${state.inventory[item.key]}）`;
        button.addEventListener("click", () => buyItem(item));
        card.appendChild(button);
        els.shopGrid.appendChild(card);
      });
      updateAllUi();
    }

    function buyItem(item) {
      if (state.coins < item.price) return;
      state.inventory[item.key] += 1;
      updateCoin(state.coins - item.price);
      renderShop();
    }

    function openBag() {
      renderBag();
      els.bagModal.classList.add("active");
    }

    function closeBag() {
      els.bagModal.classList.remove("active");
    }

    function renderBag() {
      els.bagItems.innerHTML = "";
      shopItems.forEach(item => {
        const row = document.createElement("div");
        row.className = "bag-item";
        const info = document.createElement("div");
        info.innerHTML = `<strong>${item.icon} ${item.name} x ${state.inventory[item.key]}</strong><span>${item.effect}</span>`;
        row.appendChild(info);

        const button = document.createElement("button");
        button.className = "action-btn";
        button.type = "button";
        if (item.key === "potions") {
          button.textContent = "使用";
          button.disabled = state.inventory.potions <= 0 || state.playerHp >= 100;
          button.addEventListener("click", usePotion);
        } else {
          button.textContent = "查看";
          button.disabled = true;
        }
        row.appendChild(button);
        els.bagItems.appendChild(row);
      });
    }

    function usePotion() {
      if (state.inventory.potions <= 0 || state.playerHp >= 100) return;
      state.inventory.potions -= 1;
      state.potionsUsed += 1;
      state.playerHp = Math.min(100, state.playerHp + 50);
      els.feedback.classList.remove("bad");
      els.feedback.textContent = "紅藥水恢復了 50 HP。";
      updateAllUi();
      renderBag();
    }

    function showVictory() {
      localStorage.setItem("cert_warrior", "true");
      els.endPanel.classList.remove("game-over");
      els.endTitle.textContent = "冒險完成";
      els.endMessage.textContent = "感謝你的旅程。";
      renderResults();
      showScreen("endScreen");
    }

    function showGameOver() {
      els.endPanel.classList.add("game-over");
      els.endTitle.textContent = "Game Over";
      els.endMessage.textContent = "HP 1 又被擊倒，冒險失敗了。重新開始再挑戰一次！";
      renderResults();
      showScreen("endScreen");
    }

    function renderResults() {
      els.resultCorrect.textContent = state.correctCount;
      els.resultCoins.textContent = state.coins;
      els.resultPotions.textContent = state.potionsUsed;
    }

    function updateAllUi() {
      updateHpUi("player", state.playerHp, 100);
      updateHpUi("monster", state.monsterHp, 100);
      els.inventorySummary.innerHTML = `
        <span>🧪 紅藥水 x ${state.inventory.potions}</span>
        <span>💎 攻擊水晶 x ${state.inventory.crystals}</span>
        <span>🛡 救命符 x ${state.inventory.charms}</span>
      `;
      els.bagBtn.disabled = !els.battleScreen.classList.contains("active");
    }

    function updateHpUi(type, hp, max) {
      const percent = Math.max(0, Math.min(100, Math.round((hp / max) * 100)));
      const fill = type === "player" ? els.playerHpFill : els.monsterHpFill;
      const text = type === "player" ? els.playerHpText : els.monsterHpText;
      fill.style.width = `${percent}%`;
      fill.classList.toggle("low", percent < 50 && percent >= 20);
      fill.classList.toggle("danger", percent < 20);
      text.textContent = `${hp} / ${max}`;
    }

    function updateCoin(value, animate = true) {
      state.coins = value;
      els.coinText.textContent = state.coins;
      if (animate) {
        els.coinCounter.classList.remove("pop");
        void els.coinCounter.offsetWidth;
        els.coinCounter.classList.add("pop");
      }
    }

    function setAnswerButtons(disabled) {
      [...els.answers.querySelectorAll("button")].forEach(button => {
        button.disabled = disabled;
      });
    }

    function flashArena(className) {
      els.arena.classList.remove(className);
      void els.arena.offsetWidth;
      els.arena.classList.add(className);
      setTimeout(() => els.arena.classList.remove(className), 650);
    }

    function showCritical() {
      flashArena("critical");
      els.criticalText.classList.remove("show");
      void els.criticalText.offsetWidth;
      els.criticalText.classList.add("show");
      setTimeout(() => els.criticalText.classList.remove("show"), 780);
    }

    function bump(element) {
      element.classList.remove("hit");
      void element.offsetWidth;
      element.classList.add("hit");
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    els.bagBtn.addEventListener("click", openBag);
    els.closeBagBtn.addEventListener("click", closeBag);
    els.bagModal.addEventListener("click", event => {
      if (event.target === els.bagModal) closeBag();
    });
    els.nextLevelBtn.addEventListener("click", () => {
      state.restartedAtOneHp = false;
      startLevel(state.level + 1, state.playerHp);
    });
    els.restartBtn.addEventListener("click", () => {
      showScreen("loadingScreen");
      els.loadingText.textContent = "重新整理冒險狀態中";
      setTimeout(startGame, 350);
    });
    els.endingCutscene.addEventListener("click", advanceEndingCutscene);
    window.addEventListener("keydown", (event) => {
      if ((event.key === "Enter" || event.key === " ") && els.endingCutscene.classList.contains("show")) {
        event.preventDefault();
        advanceEndingCutscene();
      }
    });

    loadQuestions();
  </script>
</body>
</html>
